{% extends 'base.html' %}

{% block content %}

<section id="certificates-archive" class="py-5" style="min-height: calc(100vh - 160px);">
    <div class="container">
        
        <div class="text-center mb-5">
            <h1 class="text-white font-orbitron mb-2 tracking-widest">
                <i class="fa-solid fa-award text-info me-2"></i> VALIDATED_CREDENTIALS
            </h1>
            <p class="text-muted font-rajdhani tracking-wide uppercase">[SECURITY_CLEARANCE // VERIFIED]</p>
            <div class="cyber-accent-line mx-auto"></div>
        </div>

        <div class="row g-4">
            {% for cert in certificates %}
            <div class="col-sm-6 col-md-4 col-lg-3">
                <div class="cert-wrapper glass-card p-2 text-center h-100 d-flex align-items-center justify-content-center">
                    
                    <div class="position-relative overflow-hidden rounded w-100">
                        <img src="{{ cert.image.url }}" class="img-fluid cyber-cert-img" alt="Certificate Node 0{{ forloop.counter }}">
                        
                        <div class="cert-node-tag font-orbitron">
                            NODE_0{{ forloop.counter }}
                        </div>
                    </div>
                    
                </div>
            </div>
            {% endfor %}
        </div>

    </div>
</section>

<style>
    .font-orbitron { 
        font-family: 'Orbitron', sans-serif; 
    }
    .font-rajdhani {
        font-family: 'Rajdhani', sans-serif;
    }

    /* Garis Aksen Dekorasi di Bawah Judul */
    .cyber-accent-line {
        width: 80px;
        height: 2px;
        background: linear-gradient(90deg, #4facfe, #00f2fe);
        box-shadow: 0 0 12px #00f2fe;
    }

    /* Label Node Kecil di Atas Gambar */
    .cert-node-tag {
        position: absolute;
        bottom: 6px;
        right: 6px;
        background: rgba(6, 9, 19, 0.8);
        border: 1px solid rgba(0, 242, 254, 0.4);
        color: #00f2fe;
        font-size: 0.65rem;
        padding: 2px 6px;
        border-radius: 4px;
        letter-spacing: 1px;
        pointer-events: none;
    }
</style>

{% endblock %}
