{% load static %}

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Aliya Zahra | Futuristic Portfolio{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-space: #060913;
            --neon-cyan: #00f2fe;
            --neon-blue: #4facfe;
            --glass-bg: rgba(10, 25, 47, 0.7);
            --glass-border: rgba(0, 242, 254, 0.2);
            --text-glow: 0 0 10px rgba(0, 242, 254, 0.6);
        }

        body {
            background-color: var(--bg-space);
            /* Efek gugusan bintang / starfield murni menggunakan CSS */
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            color: #e2e8f0;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.15rem;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3, h4, h5, h6, .navbar-brand {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
        }

        /* Helper class global untuk pendaran text neon */
        .cyber-glow-text {
            color: var(--neon-cyan);
            text-shadow: var(--text-glow);
        }

        /* Pembatas antar section bergaya cyberpunk gradient */
        .cyber-hr {
            border: none;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
            margin: 3rem 0;
            opacity: 0.7;
        }

        /* Mendorong footer tetap di bawah jika konten sedikit */
        main {
            flex: 1;
        }
    </style>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    {% include 'navbar.html' %}

    <main class="container my-4">
        {% block content %}
        {% endblock %}
    </main>

    {% include 'footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="{% static 'js/darkmode.js' %}"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            document.querySelectorAll('.glass-card').forEach(card => {
                card.addEventListener('mouseenter', () => {
                    const img = card.querySelector('.card-img-top');
                    if(img) img.style.transform = 'scale(1.08)';
                });
                card.addEventListener('mouseleave', () => {
                    const img = card.querySelector('.card-img-top');
                    if(img) img.style.transform = 'scale(1)';
                });
            });
        });
    </script>
</body>
</html>
